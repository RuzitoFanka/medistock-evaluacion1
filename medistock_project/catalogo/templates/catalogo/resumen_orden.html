{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediStock Portal – Confirmación de Pedido</title>
    <link rel="stylesheet" href="{% static 'catalogo/resumen.css' %}?v=1.0">
</head>
<body>

    <header class="navbar-custom">
        <a href="{% url 'pantalla-tienda' %}" class="navbar-brand">
            ⚕️ MediStock Portal
        </a>
    </header>

    <main class="container">
        <div class="header-title">
            <span>📋 Detalle de los Insumos Solicitados</span>
        </div>
        <div class="subtitle">Revise su orden de requerimiento antes del despacho final de almacén.</div>

        <table class="order-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th style="text-align: center;">Cantidad</th>
                    <th style="text-align: right;">Precio Unitario</th>
                    <th style="text-align: right;">Total</th>
                </tr>
            </thead>
            <tbody id="resumenProductosContainer">
                </tbody>
        </table>

        <div class="total-row">
            <span class="total-label">Total de la Orden:</span>
            <span class="total-amount" id="resumenTotalVal">$0</span>
        </div>

        <div class="actions-container">
            <a href="{% url 'pantalla-tienda' %}" class="btn-back">
                ← Volver al Catálogo
            </a>
            <button class="btn-confirm" onclick="finalizarFlujoOrden()">
                Confirmar Requerimiento Comercial
            </button>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            cargarResumenDesdeMemoria();
        });

        function cargarResumenDesdeMemoria() {
            const datosCarrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const contenedor = document.getElementById('resumenProductosContainer');
            const txtTotal = document.getElementById('resumenTotalVal');
            
            if (!contenedor) return;

            if (datosCarrito.length === 0) {
                contenedor.innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-state">
                            <div style="font-size: 40px; margin-bottom: 10px;">📦</div>
                            No se encontraron productos activos registrados en esta orden médica.
                        </td>
                    </tr>`;
                txtTotal.innerText = "$0";
                return;
            }

            contenedor.innerHTML = '';
            let sumaFinal = 0;

            datosCarrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                sumaFinal += subtotal;

                const fila = document.createElement('tr');
                fila.innerHTML = `
                    <td>
                        <div class="product-info">
                            <span class="product-icon">💊</span>
                            <div>
                                <strong style="color: #0f172a;">${item.nombre}</strong><br>
                                <small style="color: #64748b; font-size:12px;">ID Sistema: ${item.id}</small>
                            </div>
                        </div>
                    </td>
                    <td style="text-align: center;">
                        <span class="badge-qty">${item.cantidad} un.</span>
                    </td>
                    <td style="text-align: right; font-weight: 500; color: #334155;">
                        $${item.precio.toFixed(0)}
                    </td>
                    <td style="text-align: right; font-weight: 700; color: #0f172a;">
                        $${subtotal.toFixed(0)}
                    </td>
                `;
                contenedor.appendChild(fila);
            });

            txtTotal.innerText = `$${sumaFinal.toFixed(0)}`;
        }

        function finalizarFlujoOrden() {
            localStorage.removeItem('carrito');
            alert("¡Requerimiento aprobado e ingresado al sistema de distribución con éxito!");
            window.location.href = "{% url 'pantalla-tienda' %}";
        }
    </script>
</body>
</html>
